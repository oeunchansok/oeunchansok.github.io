<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banded</title>
    <style>
        body {
            margin: 0;
            padding: 0;
        }
        .header1 , .header2,.footer{
            background: gainsboro;
        }
        .header{
            display: flex;
            justify-content: space-between;
            height: 8vh;
            margin-bottom: 0.5rem;
        }
        .header1{
            width: 30%;
        }
        .header2{
            width: 50%;
        }        
        .center{
            display: flex;
            /* height: 70vh; */
            margin-bottom: 0.5rem;

        }
        .footer{
            height: 8vh;
        }
        .sidebar-left{
             width: 20%;
             margin-right: 0.5rem;
        }
        .sidebar-right{
            width: 80%;
            height: 90vh;
            background: gainsboro;
        }
        .left1{
            background: gainsboro;
            height: 50vh;
            /* width:40% ; */
        }
        .left2{
            margin-top: 0.5rem;
            /* width:40% ; */
            background: gainsboro;
            height: 30vh;
        }


    </style>
</head>
<body>
    <div class="banded">
        <div class="header">
            <div class="header1"></div>
            <div class="header2"></div>
        </div>
         <div class="center">
            <div class="sidebar-left">
                <div class="left1">1</div>
                <div class="left2">2</div>
            </div>
            <div class="sidebar-right">1</div>
        </div>
        <div class="footer"></div>
        
    </div>
    
</body>
</html>
