<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;padding: 0;
        }
        .header{
            height: 10vh;
            width: 100%;
            background: gainsboro;
            margin-bottom: 0.5rem;
        }
        .center{
            display: flex;
        }
        .left{
            width: 30%;
            margin-right: 0.5rem;
        }
        .left1{
            background: gainsboro;
            height: 40vh;
            margin-bottom: 0.5rem;
            
        }
        .left2{
            background: gainsboro;
            height: 15vh;
            margin-bottom: 0.5rem;

            
        }
        .left3{
            background: gainsboro;
            height: 10vh;
            margin-bottom: 0.5rem;
        }
        .right1,.right2 , .right3{
            /* width: 70%; */
            display: flex;
            justify-content: space-between;

        }
        .right2{
            /* margin-bottom: 2rem; */
            margin-top: 5rem;
        }
        .right{
            width: 100%;
        }
        .item1{
            width: 15%;
            height: 25vh;
            background: gainsboro;
        }
        .footer{
            margin-top: 0.5rem;
            width: 100%;
            background: gainsboro;
            height: 10vh;
        }

    </style>
</head>
<body>
    <div class="header"></div>
    <div class="center">
        <div class="left">
            <div class="left1"></div>
            <div class="left2"></div>
            <div class="left3"></div>
        </div>
        <div class="right">
            <div class="right1">
                <div class="item1"></div>
                <div class="item1"></div>
                <div class="item1"></div>
            </div>
            <div class="right2">
                <div class="item1"></div>
                <div class="item1"></div>
                <div class="item1"></div>
            </div>
            <div class="right2">
                <div class="item1"></div>
                <div class="item1"></div>
                <div class="item1"></div>
            </div>

            <div class="footer"></div>

        </div>
    </div>
    
</body>
</html>
